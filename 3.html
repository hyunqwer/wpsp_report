/* ─── Custom Tooltip ─── */
const CustomTooltip = ({ active, payload, label }) => {
    if (!active || !payload?.length) return null;
    return (
        <div className="custom-tooltip">

                    <span style={{marginLeft:'auto',fontWeight:900}}>{p.value}{typeof p.value==='number' && p.value<200 ? '점' : ''}</span>
                </div>
            ))}
        </div>
    );
};

/* ─── Count-up hook ─── */
function useCountUp(target, duration=1200, delay=100) {
    const [count, setCount] = useState(0);
    useEffect(() => {
        const timer = setTimeout(() => {
            const start = Date.now();
            const tick = () => {
                const elapsed = Date.now() - start;
                const progress = Math.min(elapsed / duration, 1);
                const eased = 1 - Math.pow(1 - progress, 3);
                setCount(Math.round(eased * target));
                if (progress < 1) requestAnimationFrame(tick);
            };
            requestAnimationFrame(tick);
        }, delay);
        return () => clearTimeout(timer);
    }, [target, duration, delay]);
    return count;
}

/* ─── Progress Bar ─── */
const ProgressBar = ({ value, variant='brand', delay=0 }) => {
    const cls = variant==='success' ? 'progress-fill-success' : variant==='warn' ? 'progress-fill-warn' : '';
    return (
        <div className="progress-track">
            <div
                className={`progress-fill ${cls}`}
                style={{ width:`${value}%`, animationDelay:`${delay}ms`, animationDuration:'.9s' }}
            />
        </div>
    );
};

/* ─── KPI Card ─── */

            <div className="stat-num" style={{color:'var(--text-primary)'}}>

                {unit && <span style={{fontSize:'1rem',fontWeight:700,color:'var(--text-secondary)',marginLeft:'4px'}}>{unit}</span>}
            </div>
        </div>
    );
};

                                    <div key={i} className="peer-card">
                                        {/* icon */}
                                        <div style={{
                                            width:'48px',height:'48px',borderRadius:'14px',
                                            background:`${b.color}15`,
                                            display:'flex',alignItems:'center',justifyContent:'center',
                                            marginBottom:'14px'
                                        }}>
                                            <i data-lucide={b.icon} style={{width:'22px',height:'22px',color:b.color}}></i>
                                        </div>

                                        <div style={{fontSize:'12px',fontWeight:700,color:'var(--text-muted)',marginBottom:'10px'}}>{b.metric}</div>

                                        <div style={{display:'flex',alignItems:'flex-end',gap:'10px',marginBottom:'16px'}}>
                                            <div className="stat-num" style={{color:'var(--text-primary)'}}>{b.self}<span style={{fontSize:'1rem',color:'var(--text-muted)',fontWeight:700}}>점</span></div>
                                            <div style={{
                                                background:'linear-gradient(135deg,#ecfdf5,#d1fae5)',
                                                border:'1px solid rgba(16,185,129,.2)',
                                                color:'#059669',
                                                borderRadius:'10px',
                                                padding:'4px 10px',
                                                fontSize:'12px',fontWeight:900,
                                                marginBottom:'6px'
                                            }}>+{diff}점 ↑</div>
                                        </div>

                                        {/* bars */}
                                        <div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
                                            <div>
                                                <div style={{display:'flex',justifyContent:'space-between',fontSize:'11px',fontWeight:700,marginBottom:'5px'}}>
                                                    <span style={{color:'var(--text-primary)'}}>서준이</span>
                                                    <span style={{color:b.color,fontWeight:900}}>{b.self}점</span>
                                                </div>
                                                <div className="progress-track" style={{height:'10px'}}>
                                                    <div style={{
                                                        height:'100%',borderRadius:'99px',
                                                        background:`linear-gradient(90deg,${b.color},${b.color}aa)`,
                                                        width:`${b.self}%`,
                                                        animation:'progressFill 1s ease both'
                                                    }}/>
                                                </div>
                                            </div>
                                            <div>
                                                <div style={{display:'flex',justifyContent:'space-between',fontSize:'11px',fontWeight:700,marginBottom:'5px'}}>
                                                    <span style={{color:'var(--text-muted)'}}>또래 평균</span>
                                                    <span style={{color:'var(--text-muted)'}}>{b.peer}점</span>
                                                </div>
                                                <div className="progress-track" style={{height:'8px'}}>
                                                    <div style={{
                                                        height:'100%',borderRadius:'99px',
                                                        background:'#cbd5e1',
                                                        width:`${b.peer}%`,
                                                        animation:'progressFill 1s ease .15s both'
                                                    }}/>
                                                </div>
                                            </div>
                                        </div>

                                        {/* rank badge */}
                                        <div style={{
                                            marginTop:'16px',
                                            background:`${b.color}0e`,
                                            border:`1px solid ${b.color}22`,
                                            borderRadius:'12px',
                                            padding:'8px 12px',
                                            display:'flex',alignItems:'center',gap:'6px'
                                        }}>
                                            <span style={{fontSize:'14px'}}>🏅</span>
                                            <span style={{fontSize:'11px',fontWeight:800,color:b.color}}>또래 상위 {i===0?22:i===1?15:8}%</span>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>

                        {/* overall trophy */}
                        <div style={{
                            background:'linear-gradient(135deg,#4355e8,#7b5cfa,#a78bfa)',
                            borderRadius:'24px',
                            padding:'28px 32px',
                            display:'flex',alignItems:'center',gap:'20px',flexWrap:'wrap',
                            boxShadow:'0 8px 32px rgba(67,85,232,.28)'
                        }}>
                            <div style={{fontSize:'52px',lineHeight:1,animation:'float 3s ease-in-out infinite'}}>🏆</div>
                            <div style={{flex:1,minWidth:'200px'}}>
                                <div style={{fontSize:'1.1rem',fontWeight:900,color:'white',marginBottom:'6px'}}>
                                    전체 종합 순위 · 또래 상위 15%
                                </div>
                                <div style={{fontSize:'13px',color:'rgba(255,255,255,.75)',lineHeight:1.6}}>
                                    세 가지 핵심 지표 모두에서 또래 평균을 상회하고 있어요.<br/>
                                    이 속도라면 다음 달에는 상위 10%도 가능합니다! 💪
                                </div>
                            </div>
                            <div style={{
                                background:'rgba(255,255,255,.18)',
                                backdropFilter:'blur(8px)',
                                border:'1px solid rgba(255,255,255,.3)',
                                borderRadius:'16px',
                                padding:'16px 24px',
                                textAlign:'center'
                            }}>
                                <div style={{fontSize:'2rem',fontWeight:900,color:'#ffe066'}}>+9점</div>
                                <div style={{fontSize:'12px',color:'rgba(255,255,255,.7)',fontWeight:700}}>또래 평균 대비</div>
                            </div>
                        </div>
                    </div>
                )}
            </div>

            {/* ── FOOTER ── */}
            <div style={{textAlign:'center',paddingTop:'8px'}}>
                <p style={{fontSize:'12px',color:'var(--text-muted)',fontWeight:600}}>
                    © 2026 프리미엄 초등 영어 분석 시스템 · AI 기반 개인화 리포트
                </p>
            </div>
        </div>
    );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<Dashboard/>);
</script>
</body>
</html>
