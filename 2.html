<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프리미엄 학습 리포트</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Pretendard', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#eef2ff', 100: '#e0e7ff', 500: '#6366f1', 600: '#4f46e5', 900: '#312e81' },
                        success: { 50: '#ecfdf5', 500: '#10b981', 600: '#059669' }
                    }
                }
            }
        }
    </script>
    <!-- Pretendard Font -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
    
    <!-- 아이콘 및 React 생태계 필수 라이브러리 로드 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/react-is@18/umd/react-is.production.min.js"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script> <!-- 차트 에러 방지용 추가 -->
    <script src="https://unpkg.com/recharts@2.12.3/umd/Recharts.js"></script>

    <style>
        body { background-color: #f8fafc; font-family: 'Pretendard Variable', Pretendard, sans-serif; -webkit-font-smoothing: antialiased; }
        .recharts-tooltip-cursor { fill: rgba(99, 102, 241, 0.05); }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { 
            AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, 
            RadarChart, PolarGrid, PolarAngleAxis, Radar,
            LineChart, Line, BarChart, Bar, Legend, ComposedChart
        } = Recharts;

        // 공통 UI 컴포넌트
        const Card = ({ children, className = "" }) => (
            <div className={`bg-white rounded-3xl shadow-[0_2px_20px_rgb(0,0,0,0.04)] border border-slate-100/50 overflow-hidden ${className}`}>{children}</div>
        );
        const Badge = ({ children, variant = "brand" }) => {
            const styles = variant === "brand" ? "bg-brand-50 text-brand-600 border-brand-100" : "bg-slate-100 text-slate-600 border-slate-200";
            return <span className={`px-3 py-1 rounded-full text-xs font-bold border ${styles}`}>{children}</span>;
        };
        const Progress = ({ value, className = "" }) => (
            <div className={`w-full bg-slate-100 rounded-full h-2.5 overflow-hidden ${className}`}>
                <div className="bg-brand-500 h-full rounded-full transition-all duration-500" style={{ width: `${value}%` }}></div>
            </div>
        );

        // 데이터 세팅
        const months = ["11월", "12월", "1월", "2월", "3월", "4월"];
        const vocabData = months.map((m, i) => ({ month: m, score: Math.round(70 + i * 4.5) }));
        const phonemeData = [
            { sound: "/r/", value: 85 }, { sound: "/th/", value: 76 }, { sound: "/v/", value: 88 }, { sound: "/l/", value: 92 }, { sound: "/æ/", value: 82 }
        ];
        
        // 상세 탭용 복구 데이터
        const vocabDifficultyData = months.map((m, i) => ({
            month: m,
            easy: Math.round(88 + Math.sin(i) * 4),
            mid: Math.round(75 + i * 1.2),
            hard: Math.round(55 + i * 2),
        }));
        const posAccuracy = [
            { pos: "동사", acc: 88 }, { pos: "형용사", acc: 72 }, { pos: "명사", acc: 81 }, { pos: "일상표현", acc: 93 }, { pos: "전치사", acc: 68 }
        ];
        const phonemeTrend = months.map((m, i) => ({ month: m, r: 68 + i*1.7, th: 55 + i*2.8, v: 74 + i*1.9 }));
        const timeOfDay = [
            { slot: "오전", attempts: 120, acc: 74 },
            { slot: "오후", attempts: 260, acc: 77 },
            { slot: "저녁", attempts: 410, acc: 85 },
        ];
        const peerBenchmarks = [
            { metric: "난이도-보정 어휘 정확도", self: 78, peer: 72 },
            { metric: "발음 정확도(음소 평균)", self: 84, peer: 76 },
            { metric: "유창성(WPM)", self: 95, peer: 82 },
        ];

        function Dashboard() {
            const [activeTab, setActiveTab] = useState('overview');

            // 탭 변경 시 아이콘 렌더링을 보장
            useEffect(() => {
                lucide.createIcons();
            }, [activeTab]);

            const tabs = [
                { id: 'overview', label: '개요' },
                { id: 'vocab', label: '어휘 상세' },
                { id: 'pron', label: '발음 상세' },
                { id: 'habit', label: '학습 습관' },
                { id: 'bench', label: '또래 비교' }
            ];

            return (
                <div className="max-w-6xl mx-auto p-4 md:p-8 space-y-8">
                    
                    {/* 상단 헤더 영역 */}
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-end gap-4 bg-white p-8 rounded-3xl shadow-sm border border-slate-100">
                        <div>
                            <div className="flex gap-2 mb-3">
                                <Badge variant="brand">프리미엄 AI 리포트</Badge>
                                <Badge variant="neutral">26년 4월 기준</Badge>
                            </div>
                            <h1 className="text-3xl font-extrabold text-slate-900 tracking-tight">
                                서준이의 영어 자신감이<br/>
                                <span className="text-brand-600">쑥쑥 자라고 있어요! 🌱</span>
                            </h1>
                            <p className="mt-3 text-slate-500 font-medium">초등 4학년 · 강남 센터</p>
                        </div>
                        <button className="flex items-center gap-2 bg-slate-900 text-white px-5 py-2.5 rounded-xl text-sm font-semibold hover:bg-slate-800 transition-colors shadow-md">
                            <i data-lucide="download" className="w-4 h-4"></i> PDF 다운로드
                        </button>
                    </div>

                    {/* 핵심 요약 & 칭찬 포인트 (항상 노출 - "제일 앞에 중요한 내용을 요약" 규칙 반영) */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div className="bg-gradient-to-br from-brand-500 to-brand-600 rounded-3xl p-8 text-white shadow-lg relative overflow-hidden">
                            <div className="absolute -right-10 -top-10 opacity-10"><i data-lucide="award" className="w-64 h-64"></i></div>
                            <h3 className="text-brand-100 font-semibold mb-1">우리 아이 칭찬 포인트 💬</h3>
                            <p className="text-xl font-bold leading-relaxed mb-6">
                                "서준아, 지난달보다 어려운 단어도<br/>훨씬 잘 맞히더라! 정말 멋져!"
                            </p>
                            <div className="bg-white/20 backdrop-blur-md rounded-2xl p-4 flex items-center gap-4">
                                <div className="bg-white text-brand-600 p-2 rounded-xl"><i data-lucide="trending-up" className="w-6 h-6"></i></div>
                                <div>
                                    <div className="text-sm text-brand-50">어려운 어휘 정답률</div>
                                    <div className="text-lg font-bold">+12% 수직 상승</div>
                                </div>
                            </div>
                        </div>

                        <div className="grid grid-cols-2 gap-4">
                            {[
                                { label: "종합 발음 정확도", value: "84점", trend: "+5점", icon: "mic", color: "text-blue-500", bg: "bg-blue-50" },
                                { label: "유창성 (분당 단어)", value: "95 WPM", trend: "상위 15%", icon: "wind", color: "text-emerald-500", bg: "bg-emerald-50" },
                                { label: "연속 학습 기록", value: "32일", trend: "꾸준함 왕", icon: "flame", color: "text-orange-500", bg: "bg-orange-50" },
                                { label: "집중 최고 시간대", value: "오후 8시", trend: "정답률 최고", icon: "clock", color: "text-purple-500", bg: "bg-purple-50" }
                            ].map((kpi, idx) => (
                                <Card key={idx} className="p-6 flex flex-col justify-between hover:shadow-md transition-shadow">
                                    <div className="flex justify-between items-start mb-4">
                                        <div className={`p-3 rounded-2xl ${kpi.bg}`}><i data-lucide={kpi.icon} className={`w-5 h-5 ${kpi.color}`}></i></div>
                                        <span className="text-xs font-bold text-success-600 bg-success-50 px-2 py-1 rounded-lg">{kpi.trend}</span>
                                    </div>
                                    <div>
                                        <div className="text-slate-500 text-sm font-medium">{kpi.label}</div>
                                        <div className="text-2xl font-extrabold text-slate-800 mt-1">{kpi.value}</div>
                                    </div>
                                </Card>
                            ))}
                        </div>
                    </div>

                    {/* 탭 네비게이션 */}
                    <div className="bg-white p-2 rounded-2xl shadow-sm border border-slate-100 flex flex-wrap md:flex-nowrap gap-2">
                        {tabs.map(tab => (
                            <button
                                key={tab.id}
                                onClick={() => setActiveTab(tab.id)}
                                className={`flex-1 py-3 px-4 text-sm font-bold rounded-xl transition-all ${
                                    activeTab === tab.id 
                                        ? 'bg-slate-900 text-white shadow-md' 
                                        : 'text-slate-500 hover:bg-slate-50 hover:text-slate-800'
                                }`}
                            >
                                {tab.label}
                            </button>
                        ))}
                    </div>

                    {/* 탭 콘텐츠 영역 */}
                    <div className="min-h-[400px]">
                        {/* 1. 개요 탭 */}
                        {activeTab === 'overview' && (
                            <div className="space-y-6 animate-in fade-in duration-500">
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                    <Card className="lg:col-span-2 p-6">
                                        <div className="flex justify-between items-center mb-6">
                                            <div>
                                                <h3 className="text-lg font-bold text-slate-800">어휘력 성장 추이</h3>
                                                <p className="text-sm text-slate-500">최근 6개월간 꾸준히 우상향하고 있어요</p>
                                            </div>
                                        </div>
                                        <div className="h-[280px]">
                                            <ResponsiveContainer width="100%" height="100%">
                                                <AreaChart data={vocabData} margin={{ top: 10, right: 10, left: -20, bottom: 0 }}>
                                                    <defs>
                                                        <linearGradient id="colorScore" x1="0" y1="0" x2="0" y2="1">
                                                            <stop offset="5%" stopColor="#4f46e5" stopOpacity={0.3}/>
                                                            <stop offset="95%" stopColor="#4f46e5" stopOpacity={0}/>
                                                        </linearGradient>
                                                    </defs>
                                                    <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                                    <XAxis dataKey="month" axisLine={false} tickLine={false} tick={{fill: '#64748b', fontSize: 12}} dy={10} />
                                                    <YAxis axisLine={false} tickLine={false} tick={{fill: '#64748b', fontSize: 12}} />
                                                    <Tooltip contentStyle={{ borderRadius: '16px', border: 'none', boxShadow: '0 4px 20px rgba(0,0,0,0.08)' }} />
                                                    <Area type="monotone" dataKey="score" name="종합 점수" stroke="#4f46e5" strokeWidth={4} fillOpacity={1} fill="url(#colorScore)" />
                                                </AreaChart>
                                            </ResponsiveContainer>
                                        </div>
                                    </Card>

                                    <Card className="p-6">
                                        <h3 className="text-lg font-bold text-slate-800 mb-1">발음 밸런스</h3>
                                        <p className="text-sm text-slate-500 mb-4">/l/ 발음이 원어민 수준이에요</p>
                                        <div className="h-[240px]">
                                            <ResponsiveContainer width="100%" height="100%">
                                                <RadarChart cx="50%" cy="50%" outerRadius="70%" data={phonemeData}>
                                                    <PolarGrid stroke="#e2e8f0" />
                                                    <PolarAngleAxis dataKey="sound" tick={{ fill: '#475569', fontSize: 14, fontWeight: 'bold' }} />
                                                    <Radar name="정확도" dataKey="value" stroke="#0ea5e9" strokeWidth={3} fill="#38bdf8" fillOpacity={0.4} />
                                                </RadarChart>
                                            </ResponsiveContainer>
                                        </div>
                                    </Card>
                                </div>

                                <Card className="p-1">
                                    <div className="bg-slate-50 rounded-[22px] p-6 md:p-8 flex flex-col md:flex-row gap-8 items-center">
                                        <div className="flex-shrink-0 bg-white p-4 rounded-3xl shadow-sm">
                                            <i data-lucide="book-open-check" className="w-12 h-12 text-brand-500"></i>
                                        </div>
                                        <div className="flex-grow">
                                            <h3 className="text-xl font-bold text-slate-800 mb-2">가정 연계 학습 가이드 💡</h3>
                                            <p className="text-slate-600 leading-relaxed mb-4">
                                                서준이는 현재 <b>형용사 어휘</b>와 <b>/th/ 발음</b>을 집중적으로 다듬으면 유창성이 폭발적으로 늘어나는 시기입니다. 이번 주말에는 가족과 함께 주변 사물을 영어 형용사로 묘사하는 스피드 게임을 해보시는 건 어떨까요?
                                            </p>
                                        </div>
                                    </div>
                                </Card>
                            </div>
                        )}

                        {/* 2. 어휘 상세 탭 */}
                        {activeTab === 'vocab' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 animate-in fade-in duration-500">
                                <Card className="p-6">
                                    <h3 className="text-lg font-bold text-slate-800 mb-1">난이도 구간별 정답률</h3>
                                    <p className="text-sm text-slate-500 mb-6">어려운 단어 정답률이 점진적으로 오르고 있습니다.</p>
                                    <div className="h-[280px]">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <LineChart data={vocabDifficultyData} margin={{ top: 10, right: 10, left: -20, bottom: 0 }}>
                                                <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                                <XAxis dataKey="month" axisLine={false} tickLine={false} tick={{fill: '#64748b', fontSize: 12}} />
                                                <YAxis axisLine={false} tickLine={false} tick={{fill: '#64748b', fontSize: 12}} domain={[40, 100]} />
                                                <Tooltip contentStyle={{ borderRadius: '16px', border: 'none', boxShadow: '0 4px 20px rgba(0,0,0,0.08)' }} />
                                                <Legend iconType="circle" wrapperStyle={{ fontSize: '12px', paddingTop: '10px' }}/>
                                                <Line type="monotone" dataKey="easy" stroke="#10b981" strokeWidth={3} name="쉬움" dot={{r:4}} />
                                                <Line type="monotone" dataKey="mid" stroke="#f59e0b" strokeWidth={3} name="보통" dot={{r:4}} />
                                                <Line type="monotone" dataKey="hard" stroke="#ef4444" strokeWidth={3} name="어려움" dot={{r:4}} />
                                            </LineChart>
                                        </ResponsiveContainer>
                                    </div>
                                </Card>
                                <Card className="p-6">
                                    <h3 className="text-lg font-bold text-slate-800 mb-1">품사별 정확도</h3>
                                    <p className="text-sm text-slate-500 mb-6">동사와 일상표현 활용 능력이 뛰어납니다.</p>
                                    <div className="h-[280px]">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <BarChart data={posAccuracy} margin={{ top: 10, right: 10, left: -20, bottom: 0 }}>
                                                <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                                <XAxis dataKey="pos" axisLine={false} tickLine={false} tick={{fill: '#64748b', fontSize: 12}} />
                                                <YAxis axisLine={false} tickLine={false} tick={{fill: '#64748b', fontSize: 12}} domain={[40, 100]} />
                                                <Tooltip cursor={{fill: 'transparent'}} contentStyle={{ borderRadius: '16px', border: 'none', boxShadow: '0 4px 20px rgba(0,0,0,0.08)' }} />
                                                <Bar dataKey="acc" name="정확도" fill="#6366f1" radius={[6, 6, 0, 0]} barSize={40} />
                                            </BarChart>
                                        </ResponsiveContainer>
                                    </div>
                                </Card>
                            </div>
                        )}

                        {/* 3. 발음 상세 탭 */}
                        {activeTab === 'pron' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 animate-in fade-in duration-500">
                                <Card className="p-6">
                                    <h3 className="text-lg font-bold text-slate-800 mb-1">주요 음소 정확도 추이</h3>
                                    <p className="text-sm text-slate-500 mb-6">/th/ 발음이 눈에 띄게 개선되고 있습니다.</p>
                                    <div className="h-[280px]">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <LineChart data={phonemeTrend} margin={{ top: 10, right: 10, left: -20, bottom: 0 }}>
                                                <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                                <XAxis dataKey="month" axisLine={false} tickLine={false} tick={{fill: '#64748b', fontSize: 12}} />
                                                <YAxis axisLine={false} tickLine={false} tick={{fill: '#64748b', fontSize: 12}} domain={[40, 100]} />
                                                <Tooltip contentStyle={{ borderRadius: '16px', border: 'none', boxShadow: '0 4px 20px rgba(0,0,0,0.08)' }} />
                                                <Legend iconType="circle" wrapperStyle={{ fontSize: '12px', paddingTop: '10px' }}/>
                                                <Line type="monotone" dataKey="r" name="/r/ 발음" stroke="#3b82f6" strokeWidth={3} dot={{r:4}} />
                                                <Line type="monotone" dataKey="th" name="/th/ 발음" stroke="#8b5cf6" strokeWidth={3} dot={{r:4}} strokeDasharray="5 5" />
                                                <Line type="monotone" dataKey="v" name="/v/ 발음" stroke="#ec4899" strokeWidth={3} dot={{r:4}} />
                                            </LineChart>
                                        </ResponsiveContainer>
                                    </div>
                                </Card>
                                <Card className="p-6 flex flex-col justify-center">
                                    <h3 className="text-lg font-bold text-slate-800 mb-6">발음 교정 추천 스프린트</h3>
                                    <div className="space-y-6">
                                        {[
                                            { label:"/th/ 교정 집중 훈련", desc:"문장 10개 묶음 2주", progress: 60, icon: "target", color: "text-rose-500", bg: "bg-rose-50" },
                                            { label:"/r/ vs /l/ 대비 훈련", desc:"최소대립쌍 8세트", progress: 85, icon: "mic-2", color: "text-blue-500", bg: "bg-blue-50" },
                                            { label:"억양/리듬 쉐도잉", desc:"원어민 억양 따라하기", progress: 45, icon: "music", color: "text-amber-500", bg: "bg-amber-50" },
                                        ].map((it, idx)=> (
                                            <div key={idx} className="space-y-2">
                                                <div className="flex justify-between items-center">
                                                    <div className="flex items-center gap-2">
                                                        <div className={`p-1.5 rounded-lg ${it.bg}`}><i data-lucide={it.icon} className={`w-4 h-4 ${it.color}`}></i></div>
                                                        <div className="text-sm font-bold text-slate-700">{it.label}</div>
                                                    </div>
                                                    <div className="text-xs font-semibold text-brand-600">{it.progress}% 달성</div>
                                                </div>
                                                <Progress value={it.progress} />
                                                <div className="text-xs text-slate-500 ml-8">{it.desc}</div>
                                            </div>
                                        ))}
                                    </div>
                                </Card>
                            </div>
                        )}

                        {/* 4. 학습 습관 탭 */}
                        {activeTab === 'habit' && (
                            <div className="space-y-6 animate-in fade-in duration-500">
                                <Card className="p-6">
                                    <div className="flex justify-between items-center mb-6">
                                        <div>
                                            <h3 className="text-lg font-bold text-slate-800">시간대별 학습 시도 및 정확도</h3>
                                            <p className="text-sm text-slate-500">저녁 시간대(오후 8시 전후)에 학습 효율이 가장 높습니다.</p>
                                        </div>
                                    </div>
                                    <div className="h-[280px]">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <ComposedChart data={timeOfDay} margin={{ top: 10, right: 10, left: -20, bottom: 0 }}>
                                                <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                                <XAxis dataKey="slot" axisLine={false} tickLine={false} tick={{fill: '#64748b', fontSize: 12}} />
                                                <YAxis yAxisId="left" axisLine={false} tickLine={false} tick={{fill: '#64748b', fontSize: 12}} />
                                                <YAxis yAxisId="right" orientation="right" axisLine={false} tickLine={false} tick={{fill: '#64748b', fontSize: 12}} domain={[40, 100]} />
                                                <Tooltip contentStyle={{ borderRadius: '16px', border: 'none', boxShadow: '0 4px 20px rgba(0,0,0,0.08)' }} />
                                                <Legend iconType="circle" wrapperStyle={{ fontSize: '12px', paddingTop: '10px' }}/>
                                                <Bar yAxisId="left" dataKey="attempts" name="학습 시도 횟수" fill="#e2e8f0" radius={[6, 6, 0, 0]} barSize={60} />
                                                <Line yAxisId="right" type="monotone" dataKey="acc" name="정답률(%)" stroke="#4f46e5" strokeWidth={4} dot={{r:5, fill: '#4f46e5', stroke: '#fff', strokeWidth: 2}} />
                                            </ComposedChart>
                                        </ResponsiveContainer>
                                    </div>
                                </Card>
                            </div>
                        )}

                        {/* 5. 또래 비교 탭 */}
                        {activeTab === 'bench' && (
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 animate-in fade-in duration-500">
                                {peerBenchmarks.map((b, i) => (
                                    <Card key={i} className="p-6 flex flex-col justify-between">
                                        <div className="text-sm font-bold text-slate-500 mb-6">{b.metric}</div>
                                        <div>
                                            <div className="flex justify-between items-end mb-2">
                                                <span className="text-2xl font-extrabold text-slate-800">{b.self}점</span>
                                                <span className="text-sm font-semibold text-emerald-500 bg-emerald-50 px-2 py-1 rounded-lg">
                                                    평균 대비 +{b.self - b.peer}점
                                                </span>
                                            </div>
                                            <div className="space-y-3 mt-4">
                                                <div>
                                                    <div className="flex justify-between text-xs text-slate-500 mb-1">
                                                        <span>서준이</span>
                                                    </div>
                                                    <Progress value={b.self} className="h-3" />
                                                </div>
                                                <div>
                                                    <div className="flex justify-between text-xs text-slate-400 mb-1">
                                                        <span>또래 평균 ({b.peer}점)</span>
                                                    </div>
                                                    <div className="w-full bg-slate-100 rounded-full h-2 overflow-hidden">
                                                        <div className="bg-slate-300 h-full rounded-full" style={{ width: `${b.peer}%` }}></div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </Card>
                                ))}
                            </div>
                        )}
                    </div>

                    <div className="text-center pt-8 pb-4">
                        <p className="text-sm font-semibold text-slate-400">© 2026 프리미엄 초등 영어 분석 시스템</p>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
